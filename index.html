<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>/* ── HNL Brand Tokens ── */
:root {
  --navy:       #1B2A4A;
  --teal:       #0D9488;
  --teal-light: #CCFBF1;
  --amber:      #F59E0B;
  --amber-light:#FFFBEB;
  --white:      #FFFFFF;
  --gray-50:    #F8F9FA;
  --gray-100:   #EEF0F3;
  --gray-200:   #D4D8DF;
  --gray-600:   #6B7280;
  --gray-900:   #111827;
  --accent-red: #F59E0B;
  --font:        'Plus Jakarta Sans', system-ui, sans-serif;
  --radius:      6px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
  --shadow-md:   0 4px 12px rgba(0,0,0,.10);
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--gray-50); color: var(--gray-900); font-size: 14px; }
    #app-header {
      display: flex; align-items: center; gap: 16px;
      background: var(--white); color: var(--gray-900);
      padding: 12px 24px; height: 56px;
      border-bottom: 1px solid var(--gray-200);
    }
    #logo-area {
      display: flex; align-items: center;
    }
    .airport-code {
      font-size: 20px; font-weight: 700; color: var(--teal);
      letter-spacing: 0.04em;
    }
    .org-name {
      font-size: 11px; font-weight: 400; color: var(--gray-600);
      border-left: 1px solid var(--gray-200); padding-left: 12px; margin-left: 4px;
      letter-spacing: 0.02em;
    }
    #tab-bar {
      display: flex; gap: 0;
      background: var(--white);
      border-bottom: 2px solid var(--gray-200);
      padding: 0 24px;
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      padding: 14px 20px; font-family: var(--font); font-size: 14px; font-weight: 500;
      color: var(--gray-600); border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-btn:hover { color: var(--navy); }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--teal); }
    .p3rl-badge {
      background: var(--teal); color: var(--white);
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 99px;
      white-space: nowrap;
    }
    #app-main { padding: 16px 24px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .filter-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 12px 16px;
      margin-bottom: 14px; box-shadow: var(--shadow-sm);
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); white-space: nowrap; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--gray-600); white-space: nowrap; }
    .filter-select {
      font-family: var(--font); font-size: 13px;
      border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 6px 10px; background: var(--white); color: var(--gray-900);
      cursor: pointer; min-width: 140px;
    }
    .filter-select:focus { outline: none; border-color: var(--teal); }
    .btn-reset {
      margin-left: auto; background: none; border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 6px 14px; font-family: var(--font);
      font-size: 13px; color: var(--gray-600); cursor: pointer;
    }
    .btn-reset:hover { border-color: var(--navy); color: var(--navy); }
    .btn-export {
      background: var(--teal); border: none; border-radius: var(--radius);
      padding: 6px 16px; font-family: var(--font); font-size: 13px;
      font-weight: 600; color: var(--white); cursor: pointer;
    }
    .btn-export:hover { background: #7a1c12; }
    .ban-grid {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    .ban-card {
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 12px 16px;
      box-shadow: var(--shadow-sm); position: relative;
      text-align: center;
    }
    .ban-card.lead { border-top: 3px solid var(--teal); }
    .ban-label { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    .ban-value { font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1.1; }
    .ban-card.lead .ban-value { font-size: 36px; color: var(--teal); }
    .ban-delta { font-size: 12px; font-weight: 600; margin-top: 4px; }
    .ban-delta.pos { color: var(--teal); }
    .ban-delta.neg { color: var(--accent-red); }
    .ban-tip { font-size: 11px; color: var(--gray-600); cursor: help; }
    .chart-grid {
      display: grid; gap: 14px;
      grid-template-columns: 1fr;
      margin-bottom: 16px;
    }
    .chart-grid-2 { grid-template-columns: 1fr 1fr; }
    .chart-grid-3 { grid-template-columns: 2fr 1fr; }
    .chart-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .chart-grid-3col {
      display: grid; grid-template-columns: 2fr 1fr;
      gap: 20px; margin-bottom: 24px;
    }
    .chart-card {
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .chart-title {
      font-size: 13px; font-weight: 600; color: var(--gray-900);
      margin-bottom: 14px;
    }
    .chart-container { position: relative; }
    .teaser-box {
      display: flex; align-items: center; gap: 16px;
      background: var(--navy); color: var(--white);
      border-radius: var(--radius); padding: 16px 20px;
      margin-top: 24px; font-size: 14px; font-weight: 500;
    }
    .teaser-arrow { font-size: 18px; color: var(--teal); }
    .p3rl-teaser {
      display: flex; align-items: center; gap: 16px;
      background: var(--navy); color: var(--white);
      border-radius: var(--radius); padding: 16px 20px;
      margin-top: 24px;
    }
    .p3rl-teaser-icon { font-size: 24px; }
    .p3rl-teaser-text { font-size: 14px; font-weight: 500; }
    .match-banner {
      background: linear-gradient(135deg, var(--navy) 0%, #243b6e 100%);
      color: var(--white); border-radius: var(--radius);
      padding: 18px 24px; margin-bottom: 20px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 24px;
      box-shadow: var(--shadow-md);
    }
    .match-headline { font-size: 20px; font-weight: 700; }
    .match-headline span { color: var(--teal); }
    .match-stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .match-stat { font-size: 13px; color: rgba(255,255,255,.75); }
    .match-stat strong { color: var(--white); }
    .sankey-subtitle {
      font-size: 11px; color: var(--gray-600);
      text-align: center; margin-top: 8px; font-style: italic;
    }
    .chart-info-icon {
      display: inline-block; margin-left: 6px;
      font-size: 12px; color: var(--gray-600);
      cursor: help; vertical-align: middle; line-height: 1;
    }
    [data-tooltip] { position: relative; cursor: help; }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--gray-900); color: var(--white);
      font-size: 11px; font-weight: 400; line-height: 1.4;
      padding: 6px 10px; border-radius: 4px; white-space: pre-wrap;
      width: 240px; z-index: 200; pointer-events: none; opacity: 0;
      transition: opacity .15s;
    }
    [data-tooltip]:hover::after { opacity: 1; }

    /* ── Choropleth Map ── */
    .map-container {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .map-container svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .map-tooltip {
      position: absolute;
      background: rgba(27,42,74,0.95);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.7;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
      display: none;
    }
    .map-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: var(--gray-600);
    }
    .map-legend-bar {
      width: 80px;
      height: 8px;
      border-radius: 2px;
    }

/* ── Hero BAN (Personas tab) ── */
.ban-hero {
  background: var(--amber-light); border: 2px solid var(--amber);
  border-radius: var(--radius); padding: 20px 28px;
  margin-bottom: 16px; display: flex; align-items: center; gap: 32px;
}
.ban-hero-number {
  font-size: 64px; font-weight: 700; color: var(--amber); line-height: 1;
  white-space: nowrap;
}
.ban-hero-label {
  font-size: 16px; font-weight: 600; color: var(--gray-900); max-width: 360px;
}
.ban-hero-bar-wrap { flex: 1; }
.ban-hero-bar-label { font-size: 11px; color: var(--gray-600); margin-bottom: 4px; }
.ban-hero-bar-track {
  height: 8px; background: var(--gray-200); border-radius: 4px; position: relative; margin-bottom: 6px;
}
.ban-hero-bar-fill {
  height: 100%; border-radius: 4px; background: var(--amber);
}
/* ── Vendor Recommendation Callout ── */
.vendor-callout {
  background: var(--amber-light); border-left: 4px solid var(--amber);
  border-radius: var(--radius); padding: 20px 24px;
  margin-top: 24px; font-size: 14px; color: var(--gray-900);
}
.vendor-callout-title {
  font-size: 13px; font-weight: 700; color: var(--amber);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
}
/* ── Mauka SVG Schematic ── */
.mauka-schematic {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow-sm); margin-bottom: 16px;
}
.mauka-schematic-title {
  font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 16px;
}
</style>

<body>
  <header id="app-header">
    <div id="logo-area">
      <span class="airport-code">HNL</span>
    </div>
    <span class="org-name">Daniel K. Inouye International Airport</span>
  </header>

  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="passengers">Passenger Traffic</button>
    <button class="tab-btn" data-tab="concessions">Concession Revenue</button>
    <button class="tab-btn" data-tab="spaces">Retail Space Performance</button>
    <button class="tab-btn" data-tab="personas">
      Passenger Personas
      <span class="p3rl-badge">Powered by P3RL Identity Resolution</span>
    </button>
  </nav>

  <main id="app-main">
    <div id="tab-passengers" class="tab-content active"></div>
    <div id="tab-concessions" class="tab-content"></div>
    <div id="tab-spaces"      class="tab-content"></div>
    <div id="tab-personas"    class="tab-content"></div>
  </main>

  <script>// ── config.js ──
const CONFIG = {
  org: {
    name:    "Daniel K. Inouye International Airport",
    tagline: "Honolulu, Hawaiʻi — 21.9M Passengers Annually",
  },
  terminals: [
    "Terminal 1 – Domestic",
    "Terminal 2 – International",
    "Mauka Concourse",
    "Interisland Terminal",
  ],
  originMarkets: ["US Mainland", "Japan", "Korea", "Australia", "Canada"],
  carriers: ["Hawaiian Airlines", "United", "Delta", "JAL", "ANA", "Korean Air"],
  categories: ["F&B", "Specialty Retail", "Duty-Free / Premium"],
  spaceTypes: ["F&B", "Specialty Retail", "Duty-Free / Premium", "Available"],
  scale: {
    totalPassengers:        21_900_000,
    linkedProfiles:         13_100_000,
    intlPassengerShare:     28,
    matchConfidence:        92,
    avgDwellMinutes:        74,
    spendPerEnplanement:    18.40,
    retailConversionRate:   23,
    intlLeisureSpendPremium: 4.1,
    vacantSpaces:           2,
    totalRetailSqft:        142_000,
    vacantSqft:             8_400,
    sampleSize:             3_000,
  },
  palette: {
    navy:   "#1B2A4A",
    teal:   "#0D9488",
    teal2:  "#0F766E",
    amber:  "#F59E0B",
    slate:  "#5B7FA6",
    blue:   "#2E618F",
    gray:   "#8B96A5",
    gray2:  "#C5CBD4",
  },
  p3rl: {
    badgeLabel: "Powered by P3RL Identity Resolution",
  },
};


// ── data.js ──
// ── Shared helpers ───────────────────────────────────────────────────────────
function deterministicVariance(dateStr, terminal, salt = 0) {
  let hash = 0;
  const str = dateStr + terminal + salt;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return (Math.abs(hash) % 1000) / 1000;
}

const START_DATE = new Date('2025-01-01');
const END_DATE   = new Date('2025-12-31');

function dateRange() {
  const dates = [];
  for (let d = new Date(START_DATE); d <= END_DATE; d.setDate(d.getDate() + 1)) {
    dates.push(new Date(d).toISOString().slice(0, 10));
  }
  return dates;
}
const DATES = dateRange();

// Terminal base passenger volumes (daily avg)
const TERMINAL_BASE_PAX = {
  "Terminal 1 – Domestic":     6_800,
  "Terminal 2 – International":2_400,
  "Mauka Concourse":           3_200,
  "Interisland Terminal":      1_600,
};

// Terminal intl % base
const TERMINAL_INTL_BASE = {
  "Terminal 1 – Domestic":     0.04,
  "Terminal 2 – International":0.82,
  "Mauka Concourse":           0.45,
  "Interisland Terminal":      0.01,
};

// Carrier terminal affinity weights [Hawaiian, United, Delta, JAL, ANA, Korean Air]
const TERMINAL_CARRIER_WEIGHTS = {
  "Terminal 1 – Domestic":     [0.55, 0.20, 0.18, 0.02, 0.02, 0.03],
  "Terminal 2 – International":[0.10, 0.12, 0.08, 0.28, 0.24, 0.18],
  "Mauka Concourse":           [0.30, 0.22, 0.20, 0.10, 0.08, 0.10],
  "Interisland Terminal":      [0.92, 0.03, 0.03, 0.01, 0.01, 0.00],
};

// Origin market weights per terminal
const TERMINAL_ORIGIN_WEIGHTS = {
  "Terminal 1 – Domestic":     [0.72, 0.08, 0.06, 0.08, 0.06],
  "Terminal 2 – International":[0.08, 0.35, 0.28, 0.18, 0.11],
  "Mauka Concourse":           [0.40, 0.22, 0.16, 0.14, 0.08],
  "Interisland Terminal":      [0.85, 0.05, 0.04, 0.04, 0.02],
};

const DAILY_PASSENGERS = [];
for (const date of DATES) {
  for (const terminal of CONFIG.terminals) {
    const v  = deterministicVariance(date, terminal, 1);
    const v2 = deterministicVariance(date, terminal, 2);
    const v3 = deterministicVariance(date, terminal, 3);

    // Seasonal multiplier: peaks in July–Aug and Dec
    const month = new Date(date).getMonth(); // 0-11
    const seasonal = 1 + 0.25 * Math.sin((month - 2) * Math.PI / 6);

    const basePax    = TERMINAL_BASE_PAX[terminal];
    const totalPax   = Math.round(basePax * seasonal * (0.85 + v * 0.30));
    const intlBase   = TERMINAL_INTL_BASE[terminal];
    const intlPct    = Math.min(0.95, Math.max(0.01, intlBase + (v2 - 0.5) * 0.06));
    const connectPct = Math.round((0.18 + v * 0.22) * 100) / 100;
    const avgDwell   = Math.round(45 + v3 * 70);

    // Dwell buckets (must sum to totalPax)
    const d1 = Math.round(totalPax * (0.12 + v  * 0.08));
    const d2 = Math.round(totalPax * (0.22 + v2 * 0.10));
    const d3 = Math.round(totalPax * (0.28 + v  * 0.08));
    const d4 = Math.round(totalPax * (0.20 + v3 * 0.06));
    const d5 = totalPax - d1 - d2 - d3 - d4;

    // Carrier mix
    const cw = TERMINAL_CARRIER_WEIGHTS[terminal];
    const [pHawaiian, pUnited, pDelta, pJAL, pANA, pKorean] =
      CONFIG.carriers.map((_, i) => Math.round(totalPax * (cw[i] + (deterministicVariance(date, terminal, 10+i) - 0.5) * 0.02)));

    // Origin mix
    const ow = TERMINAL_ORIGIN_WEIGHTS[terminal];
    const [pUSM, pJapan, pKorea, pAustralia, pCanada] =
      CONFIG.originMarkets.map((_, i) => Math.round(totalPax * (ow[i] + (deterministicVariance(date, terminal, 20+i) - 0.5) * 0.03)));

    DAILY_PASSENGERS.push({
      date, terminal,
      total_passengers: totalPax,
      intl_pct:         Math.round(intlPct * 100) / 100,
      connecting_pct:   connectPct,
      avg_dwell_minutes: avgDwell,
      dwell_under30:    d1,
      dwell_30_60:      d2,
      dwell_60_90:      d3,
      dwell_90_120:     d4,
      dwell_over120:    Math.max(0, d5),
      pax_us_mainland:  pUSM,
      pax_japan:        pJapan,
      pax_korea:        pKorea,
      pax_australia:    pAustralia,
      pax_canada:       pCanada,
      pax_hawaiian:     pHawaiian,
      pax_united:       pUnited,
      pax_delta:        pDelta,
      pax_jal:          pJAL,
      pax_ana:          pANA,
      pax_korean_air:   pKorean,
    });
  }
}

// ── DAILY_CONCESSIONS ────────────────────────────────────────────────────────
const TERMINAL_SPPE_BASE = {
  "Terminal 1 – Domestic":     14.20,
  "Terminal 2 – International":28.50,
  "Mauka Concourse":           21.80,
  "Interisland Terminal":       8.40,
};

const DAILY_CONCESSIONS = [];
for (const date of DATES) {
  for (const terminal of CONFIG.terminals) {
    const v  = deterministicVariance(date, terminal, 4);
    const v2 = deterministicVariance(date, terminal, 5);
    const v3 = deterministicVariance(date, terminal, 6);

    const paxRow = DAILY_PASSENGERS.find(r => r.date === date && r.terminal === terminal);
    const pax    = paxRow ? paxRow.total_passengers : 1000;

    const sppe       = TERMINAL_SPPE_BASE[terminal] * (0.88 + v * 0.24);
    const totalRev   = Math.round(pax * sppe);
    const fbPct      = 0.48 + v2 * 0.10;
    const retPct     = 0.28 + v  * 0.08;
    const premPct    = 1 - fbPct - retPct;

    const revFB      = Math.round(totalRev * fbPct);
    const revRetail  = Math.round(totalRev * retPct);
    const revPremium = Math.round(totalRev * Math.max(0.05, premPct));

    const txnFB      = Math.round(pax * (0.38 + v  * 0.14));
    const txnRetail  = Math.round(pax * (0.12 + v2 * 0.08));
    const txnPremium = Math.round(pax * (0.04 + v3 * 0.04));

    // Peak hour buckets (% of daily revenue)
    const peakMorning    = Math.round(totalRev * (0.14 + v  * 0.06));
    const peakMidmorning = Math.round(totalRev * (0.22 + v2 * 0.08));
    const peakMidday     = Math.round(totalRev * (0.28 + v3 * 0.06));
    const peakAfternoon  = Math.round(totalRev * (0.22 + v  * 0.06));
    const peakEvening    = totalRev - peakMorning - peakMidmorning - peakMidday - peakAfternoon;

    DAILY_CONCESSIONS.push({
      date, terminal,
      revenue_fb:       revFB,
      revenue_retail:   revRetail,
      revenue_premium:  revPremium,
      transactions_fb:  txnFB,
      transactions_retail: txnRetail,
      transactions_premium: txnPremium,
      sppe:             Math.round(sppe * 100) / 100,
      peak_morning:     peakMorning,
      peak_midmorning:  peakMidmorning,
      peak_midday:      peakMidday,
      peak_afternoon:   peakAfternoon,
      peak_evening:     Math.max(0, peakEvening),
    });
  }
}

// ── DAILY_SPACES ─────────────────────────────────────────────────────────────
const TERMINAL_SQFT = {
  "Terminal 1 – Domestic":     58_000,
  "Terminal 2 – International":34_000,
  "Mauka Concourse":           28_000,
  "Interisland Terminal":      22_000,
};

const DAILY_SPACES = [];
for (const date of DATES) {
  for (const terminal of CONFIG.terminals) {
    const v  = deterministicVariance(date, terminal, 7);
    const v2 = deterministicVariance(date, terminal, 8);

    const totalSqft  = TERMINAL_SQFT[terminal];
    // Mauka Concourse has the known vacancy; others near full
    const vacancyBase = terminal === "Mauka Concourse" ? 0.30 : (0.04 + v * 0.06);
    const vacantSqft  = Math.round(totalSqft * vacancyBase);
    const occupiedSqft = totalSqft - vacantSqft;

    const totalSpaces   = terminal === "Mauka Concourse" ? 5 : Math.round(totalSqft / 4800);
    const vacantSpaces  = terminal === "Mauka Concourse" ? 2 : Math.round(totalSpaces * vacancyBase);
    const occupiedSpaces = totalSpaces - vacantSpaces;

    const revSqftFB      = Math.round(320 + v  * 180);
    const revSqftRetail  = Math.round(280 + v2 * 200);
    const revSqftPremium = Math.round(440 + v  * 260);
    const avgDaysToLease = Math.round(38 + v2 * 52);
    const newLeases      = Math.round(v * 2);
    const activeTenants  = occupiedSpaces;

    // Tenure distribution (share of active tenants in each bucket)
    const tenure1yr  = Math.round(activeTenants * (0.12 + v  * 0.08));
    const tenure3yr  = Math.round(activeTenants * (0.28 + v2 * 0.10));
    const tenure5yr  = Math.round(activeTenants * (0.32 + v  * 0.08));
    const tenure5yr_plus = Math.max(0, activeTenants - tenure1yr - tenure3yr - tenure5yr);

    DAILY_SPACES.push({
      date, terminal,
      total_sqft:        totalSqft,
      occupied_sqft:     occupiedSqft,
      vacant_sqft:       vacantSqft,
      total_spaces:      totalSpaces,
      vacant_spaces:     vacantSpaces,
      occupied_spaces:   occupiedSpaces,
      revenue_sqft_fb:      revSqftFB,
      revenue_sqft_retail:  revSqftRetail,
      revenue_sqft_premium: revSqftPremium,
      avg_days_to_lease: avgDaysToLease,
      new_leases:        newLeases,
      active_tenants:    activeTenants,
      tenure_under1yr:   tenure1yr,
      tenure_1_3yr:      tenure3yr,
      tenure_3_5yr:      tenure5yr,
      tenure_over5yr:    tenure5yr_plus,
    });
  }
}

// ── TRAVELERS ────────────────────────────────────────────────────────────────
const SEGMENT_COUNTS = {
  'Domestic Leisure':   780,
  'Domestic Business':  420,
  "Int'l Leisure":      580,
  "Int'l Business":     320,
  'Transit':            280,
  // subtotal linked: ~1600 profiles across segments (prior_visit or multi-source)
};

// Segment → linked source probability and spend profile
const SEGMENT_PROFILE = {
  'Domestic Leisure':  { linkedProb: 0.52, fbBase: 18, retBase: 12, premBase:  4, originMarkets: [0.88,0.04,0.03,0.03,0.02], terminals: [0.60,0.08,0.22,0.10] },
  'Domestic Business': { linkedProb: 0.68, fbBase: 24, retBase:  8, premBase:  6, originMarkets: [0.90,0.02,0.02,0.03,0.03], terminals: [0.55,0.10,0.25,0.10] },
  "Int'l Leisure":     { linkedProb: 0.72, fbBase: 22, retBase: 28, premBase: 46, originMarkets: [0.06,0.38,0.28,0.18,0.10], terminals: [0.08,0.48,0.36,0.08] },
  "Int'l Business":    { linkedProb: 0.80, fbBase: 30, retBase: 22, premBase: 38, originMarkets: [0.08,0.34,0.26,0.20,0.12], terminals: [0.10,0.52,0.30,0.08] },
  'Transit':           { linkedProb: 0.42, fbBase: 14, retBase:  8, premBase: 12, originMarkets: [0.30,0.22,0.18,0.18,0.12], terminals: [0.15,0.35,0.40,0.10] },
};

const US_STATES = ['HI','NY','FL','CA','TX','NJ','CT','MA','PA','OH','IL','WA','AZ','CO','GA'];
const STATE_WEIGHTS = [8,12,10,14,9,5,4,5,4,3,4,5,4,4,4];

function weightedIndex(weights, v) {
  const total = weights.reduce((a,b)=>a+b,0);
  let cum = 0, r = v * total;
  for (let i = 0; i < weights.length; i++) {
    cum += weights[i];
    if (r <= cum) return i;
  }
  return 0;
}

const TRAVELERS = [];
let idx = 0;
for (const [segment, count] of Object.entries(SEGMENT_COUNTS)) {
  const profile = SEGMENT_PROFILE[segment];
  const isIntl = segment.startsWith("Int'l");

  for (let i = 0; i < count; i++, idx++) {
    const v  = deterministicVariance(String(idx), segment, 30);
    const v2 = deterministicVariance(String(idx), segment, 31);
    const v3 = deterministicVariance(String(idx), segment, 32);
    const v4 = deterministicVariance(String(idx), segment, 33);
    const v5 = deterministicVariance(String(idx), segment, 34);

    // Flight-linked: matched through full pipeline
    // Soft-linked: appeared in POS or loyalty data only (no flight manifest match)
    const isFlightLinked  = v < profile.linkedProb;
    const isPOSLinked     = !isFlightLinked && (idx % 15 === 3);
    const isLoyaltyLinked = !isFlightLinked && (idx % 15 === 7);
    const isLinked        = isFlightLinked || isPOSLinked || isLoyaltyLinked;

    const termIdx   = weightedIndex(profile.terminals, v2);
    const terminal  = CONFIG.terminals[termIdx];

    const originIdx    = weightedIndex(profile.originMarkets, v3);
    const origin_market = CONFIG.originMarkets[originIdx];

    const carrierIdx = isIntl
      ? weightedIndex(TERMINAL_CARRIER_WEIGHTS["Terminal 2 – International"], v4)
      : weightedIndex(TERMINAL_CARRIER_WEIGHTS["Terminal 1 – Domestic"], v4);
    const carrier = CONFIG.carriers[carrierIdx];

    // hasPOS and hasLoyalty are independent flags
    // Loyalty uses modular arithmetic (avoids hash correlation with v)
    const loyaltyMod = segment.length % 3;
    const hasPOS     = v > 0.30;
    const hasLoyalty = (idx % 3) === loyaltyMod;
    const linkedSources = isFlightLinked
      ? (['FLIGHT', hasPOS ? 'POS' : null, hasLoyalty ? 'LOYALTY' : null].filter(Boolean).join('|'))
      : isPOSLinked     ? 'POS'
      : isLoyaltyLinked ? 'LOYALTY'
      : 'FLIGHT';

    const spendFB      = Math.round((profile.fbBase   + v  * profile.fbBase)   * (isLinked ? 1.2 : 1));
    const spendRetail  = Math.round((profile.retBase  + v2 * profile.retBase)  * (isLinked ? 1.2 : 1));
    const spendPremium = Math.round((profile.premBase + v3 * profile.premBase) * (isLinked ? 1.2 : 1));
    const estimatedTotalSpend = Math.round((spendFB + spendRetail + spendPremium) * (isLinked ? 1.35 : 1.0));

    const homeState = isIntl ? null : US_STATES[weightedIndex(STATE_WEIGHTS, v)];

    TRAVELERS.push({
      global_traveler_id:      isLinked ? `GT-${String(idx).padStart(6,'0')}` : null,
      segment,
      terminal,
      origin_market,
      carrier,
      linked_sources:          linkedSources,
      match_confidence_score:  isLinked
        ? (isFlightLinked
            ? Math.round((0.85 + v * 0.14) * 100) / 100
            : Math.round((0.62 + v * 0.18) * 100) / 100)
        : null,
      spend_fb:                spendFB,
      spend_retail:            spendRetail,
      spend_premium:           spendPremium,
      estimated_total_spend:   estimatedTotalSpend,
      dwell_minutes:           Math.round(20 + v2 * 160),
      home_state:              homeState,
      prior_visit_flag:        v > 0.55,
    });
  }
}

const STATE = {
  passengers: {
    terminal:  'all',
    dateRange: 'year',
    carrier:   'all',
  },
  concessions: {
    terminal:  'all',
    dateRange: 'year',
    category:  'all',
  },
  spaces: {
    terminal:  'all',
    dateRange: 'year',
    spaceType: 'all',
  },
  personas: {
    terminal:      'all',
    segment:       'all',
    linkedStatus:  'linked',
  },
};

const DATE_PRESETS = {
  year: () => ({ start: new Date('2025-01-01'), end: new Date('2025-12-31') }),
  '90': () => {
    const end = new Date('2025-12-31');
    const start = new Date(end);
    start.setDate(start.getDate() - 90);
    return { start, end };
  },
  '30': () => {
    const end = new Date('2025-12-31');
    const start = new Date(end);
    start.setDate(start.getDate() - 30);
    return { start, end };
  },
};

function getDateWindow(dateRange) {
  return (DATE_PRESETS[dateRange] || DATE_PRESETS.year)();
}

function filterDaily(dataset, tab) {
  const s = STATE[tab];
  const { start, end } = getDateWindow(s.dateRange || 'year');
  return dataset.filter(row => {
    const d = new Date(row.date);
    if (d < start || d > end) return false;
    if (s.terminal !== 'all' && row.terminal !== s.terminal) return false;
    return true;
  });
}

function filterTravelers() {
  const s = STATE.personas;
  return TRAVELERS.filter(t => {
    if (s.linkedStatus === 'linked' && !t.global_traveler_id) return false;
    if (s.terminal !== 'all' && t.terminal !== s.terminal) return false;
    if (s.segment === 'top10') {
      const threshold = getTop10SpendThreshold();
      return t.estimated_total_spend >= threshold;
    }
    if (s.segment !== 'all' && s.segment !== 'top10' && s.segment !== 'linked') {
      return t.segment === s.segment;
    }
    return true;
  });
}

function getTop10SpendThreshold() {
  const spends = TRAVELERS.filter(t => t.global_traveler_id)
    .map(t => t.estimated_total_spend)
    .sort((a, b) => b - a);
  return spends[Math.floor(spends.length * 0.1)] || 0;
}

const fmt = {
  currency: n => '$' + (n >= 1_000_000 ? (n/1_000_000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(0)+'K' : n.toFixed(0)),
  pct:      n => (n * 100).toFixed(1) + '%',
  num:      n => n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n),
};

// ─── renderChoropleth ─────────────────────────────────────────────────────────
function renderChoropleth(canvasId, customerSubset, title) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const parent = canvas.parentElement;
  const div = document.createElement('div');
  div.id = canvasId;
  div.style.width = '100%';
  div.style.height = '220px';
  div.style.position = 'relative';
  parent.replaceChild(div, canvas);

  const counts = {};
  customerSubset.filter(c=>c.home_state).forEach(c=>{ counts[c.home_state]=(counts[c.home_state]||0)+1; });
  const maxVal = Math.max(...Object.values(counts), 1);

  const width = div.clientWidth || 400, height = 220;
  const projection = d3.geoAlbersUsa().fitSize([width, height], { type:'Sphere' });
  const path = d3.geoPath().projection(projection);
  const colorScale = d3.scaleSequentialLog([1, maxVal], [d3.hcl(210,30,95), d3.hcl(220,60,20)]);

  const svg = d3.select(div).append('svg').attr('width',width).attr('height',height);

  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
    .then(r=>r.json())
    .then(us => {
      const stateNames = {
        '36':'NY','12':'FL','06':'CA','48':'TX','34':'NJ','09':'CT','25':'MA',
        '42':'PA','39':'OH','17':'IL','13':'GA','37':'NC','51':'VA','04':'AZ','08':'CO',
      };
      svg.append('g').selectAll('path')
        .data(topojson.feature(us, us.objects.states).features)
        .join('path')
        .attr('d', path)
        .attr('fill', d => {
          const abbr = stateNames[d.id];
          return counts[abbr] ? colorScale(counts[abbr]) : '#e8edf4';
        })
        .attr('stroke','#fff').attr('stroke-width',0.5)
        .append('title').text(d => {
          const abbr = stateNames[d.id];
          return `${abbr||d.id}: ${(counts[abbr]||0).toLocaleString()} customers`;
        });
    });
}

    options:{ responsive:true, aspectRatio:5, plugins:{legend:{display:false}} },
  });

  // 2. Category Mix by Terminal
  destroyChart('chart-con-catmix');
  _charts['chart-con-catmix'] = new Chart(document.getElementById('chart-con-catmix'), {
    type:'bar',
    data:{ labels: CONFIG.terminals.map(t=>t.split('–')[0].trim()),
      datasets:[
        { label:'F&B',               data:CONFIG.terminals.map(t=>rows.filter(r=>r.terminal===t).reduce((s,r)=>s+r.revenue_fb,0)),      backgroundColor:CONFIG.palette.teal  },
        { label:'Specialty Retail',  data:CONFIG.terminals.map(t=>rows.filter(r=>r.terminal===t).reduce((s,r)=>s+r.revenue_retail,0)),  backgroundColor:CONFIG.palette.blue  },
        { label:'Duty-Free/Premium', data:CONFIG.terminals.map(t=>rows.filter(r=>r.terminal===t).reduce((s,r)=>s+r.revenue_premium,0)), backgroundColor:CONFIG.palette.amber },
      ]},
    options:{ responsive:true, scales:{x:{stacked:true},y:{stacked:true}},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}} },
  });

  // 3. Spend per Passenger by Origin Market
  destroyChart('chart-con-origin');
  const originSpendPerPax = CONFIG.originMarkets.map(m => {
    const rev = TRAVELERS.filter(t=>t.origin_market===m)
      .reduce((s,t)=>s+t.estimated_total_spend,0);
    const sample = TRAVELERS.filter(t=>t.origin_market===m).length || 1;
    return Math.round(rev / sample);
  });
  _charts['chart-con-origin'] = new Chart(document.getElementById('chart-con-origin'), {
    type:'bar',
    data:{ labels:CONFIG.originMarkets,
      datasets:[{ label:'Avg Spend / Passenger ($)', data:originSpendPerPax,
        backgroundColor:CONFIG.originMarkets.map((_,i)=>
          i===1||i===2 ? CONFIG.palette.amber : CONFIG.palette.slate) }]},
    options:{ responsive:true, plugins:{legend:{display:false}} },
  });

  // 4. Peak Hour Revenue
  destroyChart('chart-con-peak');
  const peakKeys   = ['peak_morning','peak_midmorning','peak_midday','peak_afternoon','peak_evening'];
  const peakLabels = ['Early Morning','Mid-Morning','Midday','Afternoon','Evening'];
  const peakData   = peakKeys.map(k=>rows.reduce((s,r)=>s+(r[k]||0),0));
  _charts['chart-con-peak'] = new Chart(document.getElementById('chart-con-peak'), {
    type:'bar',
    data:{ labels:peakLabels, datasets:[{ label:'Revenue', data:peakData,
      backgroundColor:[CONFIG.palette.gray2,CONFIG.palette.slate,CONFIG.palette.teal,CONFIG.palette.blue,CONFIG.palette.navy] }]},
    options:{ responsive:true, plugins:{legend:{display:false}} },
  });

  // 5. Transaction Volume by Category
  destroyChart('chart-con-txnvol');
  const txnData = [
    rows.reduce((s,r)=>s+r.transactions_fb,0),
    rows.reduce((s,r)=>s+r.transactions_retail,0),
    rows.reduce((s,r)=>s+r.transactions_premium,0),
  ];
  _charts['chart-con-txnvol'] = new Chart(document.getElementById('chart-con-txnvol'), {
    type:'bar',
    data:{ labels:CONFIG.categories,
      datasets:[{ label:'Transactions', data:txnData,
        backgroundColor:[CONFIG.palette.teal,CONFIG.palette.blue,CONFIG.palette.amber] }]},
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}} },
  });
}

// ─── renderMaukaSVG ───────────────────────────────────────────────────────────
function renderMaukaSVG(container, dailyPaxRows) {
  // Compute avg daily foot traffic past each pocket from DAILY_PASSENGERS
  // All Mauka Concourse rows; assign traffic to each pocket position
  const maukaRows = dailyPaxRows.filter(r => r.terminal === "Mauka Concourse");
  const avgDailyPax = maukaRows.length
    ? Math.round(maukaRows.reduce((s,r)=>s+r.total_passengers,0) / maukaRows.length)
    : 3200;

  // Simulate traffic past each pocket: pockets in center see more traffic
  const pocketTraffic = [
    Math.round(avgDailyPax * 0.62),  // M1
    Math.round(avgDailyPax * 0.74),  // M2
    Math.round(avgDailyPax * 0.88),  // M3 — peak: main gate cluster
    Math.round(avgDailyPax * 0.91),  // M4 — vacant, highest traffic
    Math.round(avgDailyPax * 0.85),  // M5 — vacant
  ];

  const pockets = [
    { id:'M1', label:'F&B Concept',       occupied:true  },
    { id:'M2', label:'Local Goods',        occupied:true  },
    { id:'M3', label:'Quick Service',      occupied:true  },
    { id:'M4', label:'Available',          occupied:false },
    { id:'M5', label:'Available',          occupied:false },
  ];

  const W=700, H=160, pW=110, pH=70, gap=16, startX=20, pY=70;
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width','100%');
  svg.setAttribute('height',H);

  // Flow line
  const lineY = pY + pH/2;
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', startX);
  line.setAttribute('y1', lineY);
  line.setAttribute('x2', startX + 5*(pW+gap) - gap);
  line.setAttribute('y2', lineY);
  line.setAttribute('stroke','#C5CBD4');
  line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-dasharray','6,4');
  svg.appendChild(line);

  // Direction label
  const dirText = document.createElementNS('http://www.w3.org/2000/svg','text');
  dirText.setAttribute('x', W - 10);
  dirText.setAttribute('y', lineY + 4);
  dirText.setAttribute('text-anchor','end');
  dirText.setAttribute('font-size','10');
  dirText.setAttribute('fill','#6B7280');
  dirText.textContent = '→ Gates';
  svg.appendChild(dirText);

  pockets.forEach((p, i) => {
    const x = startX + i*(pW+gap);
    const fill   = p.occupied ? '#CCFBF1' : '#FFFBEB';
    const stroke = p.occupied ? '#0D9488' : '#F59E0B';
    const textColor = p.occupied ? '#0F766E' : '#B45309';

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x); rect.setAttribute('y',pY);
    rect.setAttribute('width',pW); rect.setAttribute('height',pH);
    rect.setAttribute('rx','6'); rect.setAttribute('fill',fill);
    rect.setAttribute('stroke',stroke); rect.setAttribute('stroke-width','2');
    svg.appendChild(rect);

    const idText = document.createElementNS('http://www.w3.org/2000/svg','text');
    idText.setAttribute('x',x+pW/2); idText.setAttribute('y',pY+22);
    idText.setAttribute('text-anchor','middle');
    idText.setAttribute('font-size','11'); idText.setAttribute('font-weight','700');
    idText.setAttribute('fill',textColor);
    idText.textContent = p.id;
    svg.appendChild(idText);

    const lblText = document.createElementNS('http://www.w3.org/2000/svg','text');
    lblText.setAttribute('x',x+pW/2); lblText.setAttribute('y',pY+40);
    lblText.setAttribute('text-anchor','middle');
    lblText.setAttribute('font-size','10'); lblText.setAttribute('fill',textColor);
    lblText.textContent = p.label;
    svg.appendChild(lblText);

    // Foot traffic annotation above flow line
    const trafficText = document.createElementNS('http://www.w3.org/2000/svg','text');
    trafficText.setAttribute('x', x+pW/2);
    trafficText.setAttribute('y', pY - 10);
    trafficText.setAttribute('text-anchor','middle');
    trafficText.setAttribute('font-size','10');
    trafficText.setAttribute('fill', p.occupied ? '#6B7280' : '#B45309');
    trafficText.setAttribute('font-weight', p.occupied ? '400' : '600');
    trafficText.textContent = `${(pocketTraffic[i]/1000).toFixed(1)}K/day`;
    svg.appendChild(trafficText);
  });

  // "Vacant" badge on M4 and M5
  [3,4].forEach(i => {
    const x = startX + i*(pW+gap);
    const badge = document.createElementNS('http://www.w3.org/2000/svg','rect');
    badge.setAttribute('x',x+pW-36); badge.setAttribute('y',pY+pH-18);
    badge.setAttribute('width',32); badge.setAttribute('height',14);
    badge.setAttribute('rx','4'); badge.setAttribute('fill','#F59E0B');
    svg.appendChild(badge);
    const badgeTxt = document.createElementNS('http://www.w3.org/2000/svg','text');
    badgeTxt.setAttribute('x',x+pW-20); badgeTxt.setAttribute('y',pY+pH-7);
    badgeTxt.setAttribute('text-anchor','middle');
    badgeTxt.setAttribute('font-size','9'); badgeTxt.setAttribute('font-weight','700');
    badgeTxt.setAttribute('fill','#fff');
    badgeTxt.textContent = 'OPEN';
    svg.appendChild(badgeTxt);
  });

  container.appendChild(svg);
}

  const avgRevSqft   = rows.length ? Math.round((
    rows.reduce((s,r)=>s+r.revenue_sqft_fb,0)/rows.length * 0.48 +
    rows.reduce((s,r)=>s+r.revenue_sqft_retail,0)/rows.length * 0.28 +
    rows.reduce((s,r)=>s+r.revenue_sqft_premium,0)/rows.length * 0.24
  )) : 0;
  const totalVacant  = CONFIG.scale.vacantSqft;

  const avgDaysLease = rows.length ? Math.round(rows.reduce((s,r)=>s+r.avg_days_to_lease,0)/rows.length) : 0;
  const activeTenants = rows.length ? Math.round(rows.reduce((s,r)=>s+r.active_tenants,0)/rows.length) : 0;

  const banGrid = document.createElement('div');
  banGrid.className = 'ban-grid';
  renderBAN(banGrid, 'Occupied %',          `${avgOccPct}%`);
  renderBAN(banGrid, 'Revenue / sqft',       `$${avgRevSqft}`);
  renderBAN(banGrid, 'Vacant sqft',          totalVacant.toLocaleString(), true, 'Total square footage currently untenanted. Concentrated in Mauka Concourse.');
  renderBAN(banGrid, 'Spaces in Procurement', spacesInProc.toString());
  renderBAN(banGrid, 'Avg Days to Lease',    `${avgDaysLease}d`);
  renderBAN(banGrid, 'Active Tenants',       activeTenants.toString());
  el.appendChild(banGrid);

  // Mauka Concourse SVG schematic
  const schematicWrap = document.createElement('div');
  schematicWrap.className = 'mauka-schematic';
  const schematicTitle = document.createElement('div');
  schematicTitle.className = 'mauka-schematic-title';
  schematicTitle.innerHTML = `Mauka Concourse — Space Availability ${infoIcon('5 retail pockets in the Mauka Concourse of Terminal 1. The two amber spaces (M4, M5) are currently in procurement. Foot traffic annotations show avg daily passenger flow past each position.')}`;
  schematicWrap.appendChild(schematicTitle);

  const paxRows = filterDaily(DAILY_PASSENGERS, 'spaces');
  renderMaukaSVG(schematicWrap, paxRows);
  el.appendChild(schematicWrap);

  const midGrid = document.createElement('div');
  midGrid.className = 'chart-grid chart-grid-4';
  [
    ['chart-spc-revsqft', 'Revenue / sqft by Terminal',        'Per-sqft productivity by terminal. Terminal 2 International commands premium rents due to captive international traveler demand.'],
    ['chart-spc-vacancy', 'Occupied vs. Vacant by Terminal',    'Occupancy breakdown. Mauka Concourse vacancy stands out — the two new iShoppes spaces are in the highest-traffic zone.'],
    ['chart-spc-catmix',  'Category Mix vs. Passenger Traffic', 'Current category distribution compared to terminal passenger volume. Identifies category gaps relative to demand.'],
    ['chart-spc-tenure',  'Tenant Tenure Distribution',         'How long current tenants have operated. Long tenure signals stable revenue; short tenure may indicate recent turnover or new concepts.'],
  ].forEach(([id, title, tip]) => midGrid.appendChild(makeChartCard(id, title, tip)));
  el.appendChild(midGrid);

  renderTeaserBox(el, `→ Which passenger personas flow past each vacant space? That match only exists in the <strong>Passenger Personas</strong> tab.`);
  renderSpacesCharts(rows);
}

// ─── renderSpacesCharts ───────────────────────────────────────────────────────
function renderSpacesCharts(rows) {
  // 1. Revenue / sqft by terminal (weighted avg)
  destroyChart('chart-spc-revsqft');
  const revSqftByTerminal = CONFIG.terminals.map(t => {
    const tRows = rows.filter(r=>r.terminal===t);
    if (!tRows.length) return 0;
    return Math.round(
      tRows.reduce((s,r)=>s+r.revenue_sqft_fb,0)/tRows.length * 0.48 +
      tRows.reduce((s,r)=>s+r.revenue_sqft_retail,0)/tRows.length * 0.28 +
      tRows.reduce((s,r)=>s+r.revenue_sqft_premium,0)/tRows.length * 0.24
    );
  });
  _charts['chart-spc-revsqft'] = new Chart(document.getElementById('chart-spc-revsqft'), {
    type:'bar',
    data:{ labels:CONFIG.terminals.map(t=>t.split('–')[0].trim()),
      datasets:[{ label:'$/sqft', data:revSqftByTerminal, backgroundColor:CONFIG.palette.teal }]},
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}} },
  });

  // 2. Occupied vs Vacant by Terminal (stacked)
  destroyChart('chart-spc-vacancy');
  const latestRows = CONFIG.terminals.map(t => {
    const tRows = rows.filter(r=>r.terminal===t);
    return tRows.length ? tRows[tRows.length-1] : null;
  });
  _charts['chart-spc-vacancy'] = new Chart(document.getElementById('chart-spc-vacancy'), {
    type:'bar',
    data:{ labels:CONFIG.terminals.map(t=>t.split('–')[0].trim()),
      datasets:[
        { label:'Occupied sqft', data:latestRows.map(r=>r?r.occupied_sqft:0), backgroundColor:CONFIG.palette.teal },
        { label:'Vacant sqft',   data:latestRows.map(r=>r?r.vacant_sqft:0),   backgroundColor:CONFIG.palette.amber },
      ]},
    options:{ responsive:true, scales:{x:{stacked:true},y:{stacked:true}},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}} },
  });

  // 3. Category mix vs passenger traffic (grouped)
  destroyChart('chart-spc-catmix');
  const paxByTerminal = CONFIG.terminals.map(t =>
    DAILY_PASSENGERS.filter(r=>r.terminal===t).reduce((s,r)=>s+r.total_passengers,0) / 365
  );
  const maxPax = Math.max(...paxByTerminal);
  const paxNorm = paxByTerminal.map(p => Math.round(p/maxPax*100));
  const fbShare = CONFIG.terminals.map(t => {
    const tRows = rows.filter(r=>r.terminal===t);
    const total = tRows.reduce((s,r)=>s+r.revenue_sqft_fb+r.revenue_sqft_retail+r.revenue_sqft_premium,0);
    const fb    = tRows.reduce((s,r)=>s+r.revenue_sqft_fb,0);
    return total ? Math.round(fb/total*100) : 0;
  });
  _charts['chart-spc-catmix'] = new Chart(document.getElementById('chart-spc-catmix'), {
    type:'bar',
    data:{ labels:CONFIG.terminals.map(t=>t.split('–')[0].trim()),
      datasets:[
        { label:'Pax Index (0–100)', data:paxNorm,  backgroundColor:CONFIG.palette.gray2 },
        { label:'F&B Share %',       data:fbShare,  backgroundColor:CONFIG.palette.teal  },
      ]},
    options:{ responsive:true,
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}} },
  });

  // 4. Tenant Tenure Distribution
  destroyChart('chart-spc-tenure');
  const tenureLabels = ['<1 yr','1–3 yr','3–5 yr','5+ yr'];
  const tenureKeys   = ['tenure_under1yr','tenure_1_3yr','tenure_3_5yr','tenure_over5yr'];
  const tenureData   = tenureKeys.map(k => rows.reduce((s,r)=>s+(r[k]||0),0));
  _charts['chart-spc-tenure'] = new Chart(document.getElementById('chart-spc-tenure'), {
    type:'bar',
    data:{ labels:tenureLabels, datasets:[{ label:'Tenants', data:tenureData,
      backgroundColor:[CONFIG.palette.gray2,CONFIG.palette.slate,CONFIG.palette.blue,CONFIG.palette.navy] }]},
    options:{ responsive:true, plugins:{legend:{display:false}} },
  });
}

  renderPersonasCharts(travelers);
}

// ─── renderPersonasCharts ─────────────────────────────────────────────────────
function renderPersonasCharts(travelers) {
  // 1. Sankey: Origin Market → Terminal → Spend Category
  const sankeyEl = document.getElementById('chart-personas-sankey');
  if (!sankeyEl) return;
  sankeyEl.innerHTML = '';
  const W = sankeyEl.clientWidth || 500, H = 260;
  const svg = d3.select(sankeyEl).append('svg').attr('width',W).attr('height',H);

  const ORIGIN_MARKETS  = ['US Mainland','Japan','Korea','Australia'];  // Canada omitted
  const TERMINALS_SANKEY = CONFIG.terminals;
  const CATS = CONFIG.categories;

  // Build node list
  const nodes = [
    ...ORIGIN_MARKETS.map(name=>({name})),
    ...TERMINALS_SANKEY.map(name=>({name:name.split('–')[0].trim()})),
    ...CATS.map(name=>({name})),
  ];
  const oIdx = m => ORIGIN_MARKETS.indexOf(m);
  const tIdx = t => ORIGIN_MARKETS.length + TERMINALS_SANKEY.indexOf(t);
  const cIdx = c => ORIGIN_MARKETS.length + TERMINALS_SANKEY.length + CATS.indexOf(c);

  // Aggregate flows from TRAVELERS (linked only)
  const linked = travelers.filter(t=>t.global_traveler_id && ORIGIN_MARKETS.includes(t.origin_market));
  const originToTerminal = {};
  const terminalToCategory = {};

  linked.forEach(t => {
    const oKey = `${oIdx(t.origin_market)}_${tIdx(t.terminal)}`;
    originToTerminal[oKey] = (originToTerminal[oKey]||0) + 1;

    const spend = t.spend_fb > t.spend_retail && t.spend_fb > t.spend_premium ? 0
      : t.spend_premium >= t.spend_retail ? 2 : 1;
    const catName = CATS[spend];
    const tKey = `${tIdx(t.terminal)}_${cIdx(catName)}`;
    terminalToCategory[tKey] = (terminalToCategory[tKey]||0) + 1;
  });

  const links = [
    ...Object.entries(originToTerminal).map(([k,v])=>{
      const [s,target]=k.split('_').map(Number); return {source:s,target,value:v};
    }),
    ...Object.entries(terminalToCategory).map(([k,v])=>{
      const [s,target]=k.split('_').map(Number); return {source:s,target,value:v};
    }),
  ].filter(l=>l.value>0);

  const sankeyLayout = d3.sankey().nodeWidth(18).nodePadding(14).extent([[1,1],[W-1,H-1]]);
  const graph = sankeyLayout({ nodes: nodes.map(d=>Object.assign({},d)), links: links.map(d=>Object.assign({},d)) });

  const nodeColors = [
    ...ORIGIN_MARKETS.map(()=>CONFIG.palette.navy),
    ...TERMINALS_SANKEY.map(()=>CONFIG.palette.blue),
    CONFIG.palette.teal, CONFIG.palette.slate, CONFIG.palette.amber,
  ];

  svg.append('g').selectAll('rect')
    .data(graph.nodes).join('rect')
    .attr('x',d=>d.x0).attr('y',d=>d.y0)
    .attr('width',d=>d.x1-d.x0).attr('height',d=>Math.max(1,d.y1-d.y0))
    .attr('fill',(_,i)=>nodeColors[i]||CONFIG.palette.slate)
    .append('title').text(d=>d.name);

  svg.append('g').attr('fill','none').selectAll('path')
    .data(graph.links).join('path')
    .attr('d',d3.sankeyLinkHorizontal())
    .attr('stroke',d=>{
      // Highlight Japan → Terminal 2 → Duty-Free path in amber
      const isJapan = d.source.index===1;
      const isT2 = d.target.index === ORIGIN_MARKETS.length + 1;
      const isPremium = d.target.index === cIdx('Duty-Free / Premium');
      return (isJapan || isT2 || isPremium) ? CONFIG.palette.amber : CONFIG.palette.gray2;
    })
    .attr('stroke-width',d=>Math.max(1,d.width))
    .attr('opacity',0.55)
    .append('title').text(d=>`${d.source.name} → ${d.target.name}: ${d.value.toLocaleString()}`);

  svg.append('g').style('font','10px sans-serif').selectAll('text')
    .data(graph.nodes).join('text')
    .attr('x',d=>d.x0<W/2?d.x1+5:d.x0-5)
    .attr('y',d=>(d.y1+d.y0)/2).attr('dy','0.35em')
    .attr('text-anchor',d=>d.x0<W/2?'start':'end')
    .text(d=>d.name.length>14?d.name.slice(0,13)+'…':d.name)
    .style('fill',CONFIG.palette.navy).style('font-weight','600');

  // 2. Venn: Flight Data × Concession POS × Loyalty/External
  const hasF = t=>t.linked_sources.includes('FLIGHT');
  const hasP = t=>t.linked_sources.includes('POS');
  const hasL = t=>t.linked_sources.includes('LOYALTY');
  const linked3 = TRAVELERS.filter(t=>t.global_traveler_id);

  const flightOnly  = linked3.filter(t=> hasF(t) && !hasP(t) && !hasL(t)).length;
  const posOnly     = linked3.filter(t=>!hasF(t) &&  hasP(t) && !hasL(t)).length;
  const loyaltyOnly = linked3.filter(t=>!hasF(t) && !hasP(t) &&  hasL(t)).length;
  const flightPOS   = linked3.filter(t=> hasF(t) &&  hasP(t) && !hasL(t)).length;
  const flightLoy   = linked3.filter(t=> hasF(t) && !hasP(t) &&  hasL(t)).length;
  const posLoy      = linked3.filter(t=>!hasF(t) &&  hasP(t) &&  hasL(t)).length;
  const allThree    = linked3.filter(t=> hasF(t) &&  hasP(t) &&  hasL(t)).length;

  const vennEl = document.getElementById('chart-personas-venn');
  vennEl.innerHTML = '';
  const VW = vennEl.clientWidth || 280, VH = 240, r=72;
  const FC={x:VW/2-50,y:85}, PC={x:VW/2+50,y:85}, LC={x:VW/2,y:165};

  const vSvg = d3.select(vennEl).append('svg').attr('width',VW).attr('height',VH);
  [[FC,'#1B2A4A'],[PC,'#0D9488'],[LC,'#2E618F']].forEach(([c,col])=>{
    vSvg.append('circle').attr('cx',c.x).attr('cy',c.y).attr('r',r)
      .attr('fill',col).attr('fill-opacity',0.15).attr('stroke',col).attr('stroke-width',1.5);
  });

  const vtxt=(x,y,text,size=11,bold=false,col='#111827')=>
    vSvg.append('text').attr('x',x).attr('y',y).attr('text-anchor','middle')
      .attr('dominant-baseline','middle').attr('font-size',size)
      .attr('font-family',"'Plus Jakarta Sans',system-ui,sans-serif")
      .attr('font-weight',bold?700:500).attr('fill',col).text(text);

  vtxt(VW/2-105,52,'Flight',11,true,'#1B2A4A');
  vtxt(VW/2+105,52,'POS',11,true,'#0D9488');
  vtxt(VW/2,228,'Loyalty',11,true,'#2E618F');

  vtxt(VW/2-90,85,flightOnly.toString());
  vtxt(VW/2+90,85,posOnly.toString());
  vtxt(VW/2,210,loyaltyOnly.toString());
  vtxt(VW/2,62,flightPOS.toString(),11,true,'#0D9488');  // largest 2-way — bold
  vtxt(VW/2-48,130,flightLoy.toString());
  vtxt(VW/2+48,130,posLoy.toString());
  vtxt(VW/2,110,allThree.toLocaleString(),13,true,'#B45309');  // insight moment

  // 3. Spend scatter by segment
  destroyChart('chart-personas-spend');
  const SEGS = ['Domestic Leisure','Domestic Business','Transit',"Int'l Business","Int'l Leisure"];
  const segColors = [CONFIG.palette.gray,CONFIG.palette.gray2,CONFIG.palette.slate,CONFIG.palette.blue,CONFIG.palette.amber];
  const scatterDatasets = SEGS.map((seg,si)=>({
    type:'scatter', label:seg,
    data: travelers.filter(t=>t.segment===seg)
      .map((t,j)=>({ x: si + ((j%11)-5)*0.055, y: t.estimated_total_spend })),
    backgroundColor: segColors[si]+'66', pointRadius:3, order:1,
  }));

  function segMean(segs) {
    const sub = travelers.filter(t=>segs.includes(t.segment));
    return sub.length ? Math.round(sub.reduce((s,t)=>s+t.estimated_total_spend,0)/sub.length) : 0;
  }
  const domMean  = segMean(['Domestic Leisure','Domestic Business','Transit']);
  const intlMean = segMean(["Int'l Business","Int'l Leisure"]);
  const meanDatasets = [
    { type:'line', label:`Domestic mean $${domMean}`,
      data:[{x:-0.4,y:domMean},{x:2.4,y:domMean}],
      borderColor:CONFIG.palette.slate, borderWidth:2, borderDash:[6,3], pointRadius:0, order:0 },
    { type:'line', label:`Intl mean $${intlMean}`,
      data:[{x:2.6,y:intlMean},{x:4.4,y:intlMean}],
      borderColor:CONFIG.palette.amber, borderWidth:2, borderDash:[6,3], pointRadius:0, order:0 },
  ];

  _charts['chart-personas-spend'] = new Chart(document.getElementById('chart-personas-spend'), {
    type:'scatter',
    data:{ datasets:[...scatterDatasets,...meanDatasets] },
    options:{ responsive:true,
      scales:{
        x:{ min:-0.5, max:4.5, grid:{display:false},
          ticks:{stepSize:1, callback:val=>SEGS[Math.round(val)]||''} },
        y:{ title:{display:true,text:'Est. Total Spend ($)'} },
      },
      plugins:{ legend:{display:true,position:'bottom',labels:{boxWidth:10,font:{size:10}}},
        tooltip:{ callbacks:{
          title:items=>items[0]?.dataset?.label||'',
          label:ctx=>`Spend: $${Math.round(ctx.parsed.y).toLocaleString()}`,
        }},
      },
    },
  });

  // 4. Linked vs. Single-Source by Terminal
  destroyChart('chart-personas-linked');
  const linkedByTerminal = {}, singleByTerminal = {};
  TRAVELERS.forEach(t=>{
    if (t.global_traveler_id) linkedByTerminal[t.terminal]=(linkedByTerminal[t.terminal]||0)+1;
    else                      singleByTerminal[t.terminal]=(singleByTerminal[t.terminal]||0)+1;
  });
  _charts['chart-personas-linked'] = new Chart(document.getElementById('chart-personas-linked'), {
    type:'bar',
    data:{ labels:CONFIG.terminals.map(t=>t.split('–')[0].trim()),
      datasets:[
        { label:'Linked',        data:CONFIG.terminals.map(t=>linkedByTerminal[t]||0), backgroundColor:CONFIG.palette.teal },
        { label:'Single-Source', data:CONFIG.terminals.map(t=>singleByTerminal[t]||0), backgroundColor:CONFIG.palette.gray2 },
      ]},
    options:{ responsive:true, scales:{x:{stacked:true},y:{stacked:true}},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}} },
  });
}


// ── export.js ──
function exportCSV(tab) {
  let rows, filename, fields;
  if (tab === 'passengers') {
    rows = filterDaily(DAILY_PASSENGERS, 'passengers');
    filename = 'hnl_passenger_traffic_export.csv';
    fields = ['date','terminal','total_passengers','intl_pct','connecting_pct','avg_dwell_minutes',
              'dwell_under30','dwell_30_60','dwell_60_90','dwell_90_120','dwell_over120',
              'pax_us_mainland','pax_japan','pax_korea','pax_australia','pax_canada'];
  } else if (tab === 'concessions') {
    rows = filterDaily(DAILY_CONCESSIONS, 'concessions');
    filename = 'hnl_concession_revenue_export.csv';
    fields = ['date','terminal','revenue_fb','revenue_retail','revenue_premium',
              'transactions_fb','transactions_retail','transactions_premium','sppe',
              'peak_morning','peak_midmorning','peak_midday','peak_afternoon','peak_evening'];
  } else if (tab === 'spaces') {
    rows = filterDaily(DAILY_SPACES, 'spaces');
    filename = 'hnl_retail_spaces_export.csv';
    fields = ['date','terminal','total_sqft','occupied_sqft','vacant_sqft',
              'total_spaces','vacant_spaces','occupied_spaces',
              'revenue_sqft_fb','revenue_sqft_retail','revenue_sqft_premium',
              'avg_days_to_lease','new_leases','active_tenants'];
  } else {
    rows = filterTravelers();
    filename = 'hnl_passenger_personas_export.csv';
    fields = ['global_traveler_id','segment','terminal','origin_market','carrier',
              'linked_sources','match_confidence_score','spend_fb','spend_retail',
              'spend_premium','estimated_total_spend','dwell_minutes','home_state','prior_visit_flag'];
  }

  const header = fields.join(',');
  const body = rows.map(r => fields.map(f => JSON.stringify(r[f]??'')).join(',')).join('\n');
  const blob = new Blob([header+'\n'+body], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}


// ── main.js ──
function populateTerminalDropdowns() {
  document.querySelectorAll('select[data-filter="terminal"]').forEach(sel => {
    // Remove any previously added options (keep "All Terminals" first option)
    while (sel.options.length > 1) sel.remove(1);
    CONFIG.terminals.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      sel.appendChild(opt);
    });
  });
}

function renderTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');

  if (tabId === 'passengers')  renderPassengersTab();
  if (tabId === 'concessions') renderConcessionsTab();
  if (tabId === 'spaces')      renderSpacesTab();
  if (tabId === 'personas')    renderPersonasTab();

  populateTerminalDropdowns();
}

function handleFilter(selectEl) {
  const tab    = selectEl.dataset.tab;
  const filter = selectEl.dataset.filter;
  STATE[tab][filter] = selectEl.value;
  renderTab(tab);
}

function resetFilters(tab) {
  Object.keys(STATE[tab]).forEach(k => {
    STATE[tab][k] = k === 'linkedStatus' ? 'linked' : 'all';
  });
  renderTab(tab);
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => renderTab(btn.dataset.tab));
  });
  populateTerminalDropdowns();
  renderTab('passengers');
});
</script>
