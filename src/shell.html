<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HNL — Passenger Personas Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-venn@4.3.0/build/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
  <style>{{STYLE}}</style>
</head>
<body>
  <header id="app-header">
    <div id="logo-area">
      <span class="airport-code">HNL</span>
    </div>
    <span class="org-name">Daniel K. Inouye International Airport</span>
  </header>

  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="passengers">Passenger Traffic</button>
    <button class="tab-btn" data-tab="concessions">Concession Revenue</button>
    <button class="tab-btn" data-tab="spaces">Retail Space Performance</button>
    <button class="tab-btn" data-tab="personas">
      Passenger Personas
      <span class="p3rl-badge">Powered by P3RL Identity Resolution</span>
    </button>
  </nav>

  <main id="app-main">
    <div id="tab-passengers" class="tab-content active"></div>
    <div id="tab-concessions" class="tab-content"></div>
    <div id="tab-spaces"      class="tab-content"></div>
    <div id="tab-personas"    class="tab-content"></div>
  </main>

  <script>{{SCRIPT}}</script>
</body>
</html>
